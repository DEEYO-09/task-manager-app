<!DOCTYPE html>
<html>
<head>
    <title>HR Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4">

<h2 class="text-center mb-4">HR Dashboard</h2>

<div class="text-end mb-3">
    <a href="/logout" class="btn btn-danger">Logout</a>
</div>

<div class="card p-4 shadow mb-4">
    <h5>Assign Task</h5>

    <form method="POST">
        <input type="text" name="title" class="form-control mb-2" placeholder="Enter task" required>

        <select name="user_id" class="form-control mb-2" required>
            {% for user in users %}
                <option value="{{ user.id }}">{{ user.username }}</option>
            {% endfor %}
        </select>

        <button class="btn btn-primary w-100">Assign Task</button>
    </form>
</div>

<div class="card p-4 shadow">
    <h5>All Tasks</h5>

    <ul class="list-group">
        {% for task, user in tasks %}
        <li class="list-group-item d-flex justify-content-between">
            {{ task.title }} ({{ user.username }})

            <span class="badge bg-info">{{ task.status }}</span>
        </li>
        {% endfor %}
    </ul>

</div>

</div>

</body>
</html>
