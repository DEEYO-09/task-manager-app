<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background: linear-gradient(to right, #4facfe, #00f2fe);">

<div class="container d-flex justify-content-center align-items-center vh-100">

    <div class="card shadow p-4" style="width: 350px; border-radius: 15px;">

        <h3 class="text-center mb-3">Login</h3>

        <form method="POST">

            <input type="text" name="username" class="form-control mb-3" placeholder="Enter username" required>

            <input type="password" name="password" class="form-control mb-3" placeholder="Enter password" required>

            <button type="submit" class="btn btn-primary w-100">Login</button>

        </form>

        <p class="text-center mt-3">
            Don't have an account?
            <a href="/signup">Sign up here</a>
        </p>

    </div>

</div>
<body>
    <h2>Login</h2>

        <input type="text" name="username" placeholder="Enter username" required><br><br>
        <input type="password" name="password" placeholder="Enter password" required><br><br>
        <button type="submit">Login</button>
    </form>
    <p>
    Don't have an account?
    <a href="/signup">Sign up here</a>
    </p>
</body>
</html>
